<section class="bucket-page">
  <div class="language-switcher" aria-label="Language">
    <button
      type="button"
      *ngFor="let option of languages"
      [class.active]="language === option.code"
      [attr.aria-pressed]="language === option.code"
      (click)="setLanguage(option.code)"
    >
      {{ option.label }}
    </button>
  </div>

  <div class="hero">
    <div>
      <p class="eyebrow">{{ text.eyebrow }}</p>
      <h1>{{ text.headline }}</h1>
    </div>

    <div class="counter" [attr.aria-label]="text.counterAria">
      <span>{{ itemCount }}</span>
      <small>{{ itemCount === 1 ? text.itemLabel : text.itemsLabel }}</small>
    </div>
  </div>

  <div class="workspace">
    <form class="add-panel" (ngSubmit)="addItem()">
      <label for="goal">{{ text.newGoalLabel }}</label>
      <div class="input-row">
        <input
          id="goal"
          type="text"
          name="item"
          [placeholder]="text.placeholder"
          [(ngModel)]="goalText"
          autocomplete="off"
        />
        <button type="submit">{{ text.addButton }}</button>
      </div>
    </form>

    <section class="list-panel" [attr.aria-label]="text.listAria">
      <div class="list-header">
        <h2>{{ text.listTitle }}</h2>
        <span>{{ itemCount }} {{ text.totalLabel }}</span>
      </div>

      <p class="empty-state" *ngIf="itemCount === 0">{{ text.emptyState }}</p>

      <ul class="goal-list" *ngIf="itemCount > 0">
        <li *ngFor="let goal of goals; let i = index">
          <span>{{ goal }}</span>
          <button type="button" [attr.aria-label]="text.removeAria" (click)="removeItem(i)">
            {{ text.doneButton }}
          </button>
        </li>
      </ul>
    </section>
  </div>
</section>
